name: Mutation

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  pitest:
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"

      - name: Run PIT mutation tests (all phases)
        run: ./gradlew pitest --no-daemon --stacktrace

      - name: Upload mutation reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mutation-reports
          path: "**/build/reports/pitest/"
          if-no-files-found: ignore
